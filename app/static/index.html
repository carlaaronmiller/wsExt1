<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Water Sampler Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0b1120;
            --surface: #131b2e;
            --surface-alt: #1a2540;
            --border: #243050;
            --text: #c8d4e8;
            --text-dim: #6b7fa0;
            --accent: #22d3a7;
            --accent-dim: rgba(34, 211, 167, 0.15);
            --warn: #f59e0b;
            --error: #ef4444;
            --blue: #3b82f6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header h1 span {
            color: var(--accent);
        }

        .status-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(34, 211, 167, 0.3);
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .card-label {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .card-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text);
        }

        .card-value .unit {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-dim);
            margin-left: 4px;
        }

        .card-value.depth { color: var(--accent); }
        .card-value.temp { color: var(--blue); }
        .card-value.sal { color: var(--warn); }

        .section-title {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .aml-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .aml-card {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .aml-card .card-label { margin-bottom: 4px; }

        .aml-card .card-value {
            font-size: 1.2rem;
            color: var(--text);
        }

        .log-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
        }

        .log-table th {
            text-align: left;
            font-weight: 500;
            color: var(--text-dim);
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .log-table td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(36, 48, 80, 0.5);
            color: var(--text);
        }

        .log-table tbody tr:hover {
            background: rgba(34, 211, 167, 0.04);
        }

        .no-data {
            text-align: center;
            color: var(--text-dim);
            padding: 20px;
            font-size: 0.85rem;
        }

        .updated {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Water <span>Sampler</span></h1>
        <div id="status" class="status-badge offline">CONNECTING</div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-label">Depth</div>
            <div class="card-value depth" id="val-depth">--<span class="unit">m</span></div>
        </div>
        <div class="card">
            <div class="card-label">BAR30 Temperature</div>
            <div class="card-value temp" id="val-temp">--<span class="unit">°C</span></div>
        </div>
        <div class="card">
            <div class="card-label">Pressure</div>
            <div class="card-value" id="val-pressure">--<span class="unit">mbar</span></div>
        </div>
        <div class="card">
            <div class="card-label">Salinity (Calc)</div>
            <div class="card-value sal" id="val-sal">--<span class="unit">PSU</span></div>
        </div>
    </div>

    <div class="section-title">AML Sensors</div>
    <div class="aml-grid" id="aml-container">
        <div class="aml-card">
            <div class="card-label">Waiting for data...</div>
            <div class="card-value">--</div>
        </div>
    </div>

    <div class="log-section">
        <div class="section-title">Recent Readings</div>
        <table class="log-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Depth (m)</th>
                    <th>Temp (°C)</th>
                    <th>Sal (PSU)</th>
                </tr>
            </thead>
            <tbody id="log-body">
                <tr><td colspan="4" class="no-data">Waiting for data...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="updated" id="last-updated">Last updated: --</div>

    <script>
        const API_BASE = window.location.origin;
        const MAX_LOG_ROWS = 20;
        let logStarted = false;

        function setValue(id, val, decimals) {
            const el = document.getElementById(id);
            if (!el) return;
            const unit = el.querySelector('.unit');
            const unitText = unit ? unit.outerHTML : '';
            if (val === null || val === undefined || val === -1 || val === -2) {
                el.innerHTML = '--' + unitText;
            } else {
                el.innerHTML = Number(val).toFixed(decimals) + unitText;
            }
        }

        function buildAMLCards(aml) {
            const container = document.getElementById('aml-container');
            if (!aml || Object.keys(aml).length === 0) {
                container.innerHTML = '<div class="aml-card"><div class="card-label">No sensors detected</div><div class="card-value">--</div></div>';
                return;
            }

            container.innerHTML = '';
            for (const [key, value] of Object.entries(aml)) {
                const card = document.createElement('div');
                card.className = 'aml-card';

                const displayVal = (value !== null && value !== -1 && value !== -2)
                    ? Number(value).toFixed(2)
                    : '--';

                card.innerHTML = `
                    <div class="card-label">${key}</div>
                    <div class="card-value">${displayVal}</div>
                `;
                container.appendChild(card);
            }
        }

        function addLogRow(data) {
            const tbody = document.getElementById('log-body');

            if (!logStarted) {
                tbody.innerHTML = '';
                logStarted = true;
            }

            const row = document.createElement('tr');
            const now = new Date().toLocaleTimeString();
            const depth = data.depth !== null ? data.depth.toFixed(2) : '--';
            const temp = data.temp !== null ? data.temp.toFixed(2) : '--';
            const sal = (data.sal_calc !== null && data.sal_calc !== -1) ? Number(data.sal_calc).toFixed(2) : '--';

            row.innerHTML = `<td>${now}</td><td>${depth}</td><td>${temp}</td><td>${sal}</td>`;
            tbody.prepend(row);

            while (tbody.children.length > MAX_LOG_ROWS) {
                tbody.removeChild(tbody.lastChild);
            }
        }

        async function fetchData() {
            const status = document.getElementById('status');
            try {
                const res = await fetch(`${API_BASE}/sensor_data`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                status.textContent = 'LIVE';
                status.classList.remove('offline');

                setValue('val-depth', data.depth, 2);
                setValue('val-temp', data.temp, 2);
                setValue('val-pressure', data.pressure_mbar, 1);
                setValue('val-sal', data.sal_calc, 2);

                buildAMLCards(data.aml);
                addLogRow(data);

                document.getElementById('last-updated').textContent =
                    'Last updated: ' + new Date().toLocaleTimeString();

            } catch (err) {
                status.textContent = 'OFFLINE';
                status.classList.add('offline');
                console.warn('Fetch failed:', err.message);
            }
        }

        fetchData();
        setInterval(fetchData, 1000);
    </script>
</body>
</html>
